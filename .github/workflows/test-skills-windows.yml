name: Test skills-client on Windows

on:
  workflow_dispatch:
  push:
    paths:
      - "skills-client/**"
      - ".github/workflows/test-skills-windows.yml"

jobs:
  test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip packages (Step 3 of SETUP_PROMPT)
        run: python -m pip install requests beautifulsoup4 youtube-transcript-api yt-dlp faster-whisper

      - name: Install ffmpeg via winget and register to GITHUB_PATH (Step 4 of SETUP_PROMPT)
        shell: pwsh
        run: |
          winget install --id Gyan.FFmpeg -e --accept-source-agreements --accept-package-agreements
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")
          $ffmpegExe = Get-Command ffmpeg -ErrorAction SilentlyContinue
          if ($ffmpegExe) {
            $ffmpegDir = Split-Path $ffmpegExe.Source
            Write-Host "ffmpeg installed at: $ffmpegDir"
            ffmpeg -version | Select-Object -First 1
            $ffmpegDir | Out-File -FilePath $env:GITHUB_PATH -Append
          } else {
            Write-Host "ERROR: ffmpeg not found after winget install"
            exit 1
          }

      - name: Copy skills to .claude\skills (Step 5 of SETUP_PROMPT)
        shell: cmd
        run: |
          mkdir "%USERPROFILE%\.claude\skills" 2>nul
          xcopy /E /I /Y "skills-client\product-page-to-md" "%USERPROFILE%\.claude\skills\product-page-to-md"
          xcopy /E /I /Y "skills-client\youtube-video-to-md" "%USERPROFILE%\.claude\skills\youtube-video-to-md"

      - name: Create output folder (Step 6 of SETUP_PROMPT)
        shell: cmd
        run: mkdir "C:\health-research\ingredients" 2>nul

      - name: Run full verification (test_windows.py)
        run: python skills-client/test_windows.py
